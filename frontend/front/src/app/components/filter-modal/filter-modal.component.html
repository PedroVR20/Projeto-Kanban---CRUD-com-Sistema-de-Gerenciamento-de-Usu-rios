<div *ngIf="isVisible" class="modal-overlay" (click)="onClose()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>Filtrar Pedidos</h2>
      <button mat-icon-button (click)="onClose()">
        <mat-icon>close</mat-icon>
      </button>
    </div>

    <form class="filter-form">
      <!-- Campo de Nome -->
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Nome do Cliente</mat-label>
        <input matInput [(ngModel)]="filterData.clientName" name="clientName">
      </mat-form-field>

      <!-- Campo de ID -->
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>ID do Cliente</mat-label>
        <input matInput [(ngModel)]="filterData.clientId" name="clientId">
      </mat-form-field>

      <!-- Campo de File -->
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>File</mat-label>
        <input matInput [(ngModel)]="filterData.file" name="file">
      </mat-form-field>
    </form>

    <div class="modal-actions">
      <button mat-button type="button" (click)="onClear()">Limpar Filtros</button>
      <button mat-raised-button color="primary" type="button" (click)="onApply()">
        Aplicar Filtro
      </button>
    </div>
  </div>
</div>
