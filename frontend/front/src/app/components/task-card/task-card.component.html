<mat-card class="task-card" 
          [class.archived]="columnId === 'arquivado-column'"
          (mouseover)="hover.emit({ columnId: columnId, index: taskIndex })" 
          (mouseleave)="leave.emit()">

  <mat-card-header>
    <mat-card-title>{{ task.clientName }}</mat-card-title>
    <mat-card-subtitle>ID: {{ task.clientId }} | {{ task.visaApplicationType }}</mat-card-subtitle>
  </mat-card-header>

  <mat-card-content (click)="edit.emit()">
    <div class="task-details">
      <div class="detail-item">
        <mat-icon>public</mat-icon>
        <span>{{ task.visaCountry }}</span>
      </div>
      <div class="detail-item" *ngIf="task.agency">
        <mat-icon>business</mat-icon>
        <span>{{ task.agency }}</span>
      </div>
      <div class="detail-item status-badge">
        <mat-icon>label_important_outline</mat-icon>
        <span>{{ task.processStatus }}</span>
      </div>
    </div>
  </mat-card-content>

  <mat-card-footer>
    <div class="footer-info">
      <mat-icon>today</mat-icon>
      <span>Contratado em: {{ task.hiringDate | date:'dd/MM/yyyy' }}</span>
    </div>

    <!-- ÁREA DOS BOTÕES DE AÇÃO -->
    <div *ngIf="isHovered && columnId !== 'arquivado-column'" class="action-buttons">
      <button mat-button color="primary" class="action-button" (click)="edit.emit()">
        Editar
      </button>
      <button mat-button color="warn" class="action-button" (click)="onCancelClick($event)">
        Cancelar
      </button>
    </div>
  </mat-card-footer>
</mat-card>
