services:
  
  postgres_pedidos:
    image: postgres:15
    container_name: postgres_pedidos
    restart: always
    ports:
      - "5434:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=adminpass
      - POSTGRES_DB=pedidos_db
    volumes:
      - pgdata_pedidos:/var/lib/postgresql/data
    networks:
      - kanban-network

  
  postgres_logs:
    image: postgres:15
    container_name: postgres_logs
    restart: always
    ports:
      - "5433:5432" 
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=adminpass
      - POSTGRES_DB=logs_db
    volumes:
      - pgdata_logs:/var/lib/postgresql/data
    networks:
      - kanban-network

volumes:
  pgdata_pedidos:
    driver: local
  pgdata_logs:
    driver: local

networks:
  kanban-network:
    driver: bridge