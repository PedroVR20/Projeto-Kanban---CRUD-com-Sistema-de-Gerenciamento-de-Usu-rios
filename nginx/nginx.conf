upstream api_usuarios  { server api-usuarios:8080; }
upstream api_pedidos   { server api-pedidos:8081; }
upstream api_vistos    { server api-vistos:8080; }
upstream api_agencias  { server api-agencias:8080; }

server {
    listen 80;
    server_name _;

    # ── Timeouts ──────────────────────────────────────────────────────
    proxy_connect_timeout 10s;
    proxy_read_timeout    60s;
    proxy_send_timeout    60s;

    # ── Headers padrão repassados ao backend ──────────────────────────
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── Roteamento das APIs ───────────────────────────────────────────

    location /api/v1/usuarios {
        proxy_pass http://api_usuarios;
    }

    location /api/tasks {
        proxy_pass http://api_pedidos;
    }

    location /api/v1/vistos {
        proxy_pass http://api_vistos;
    }

    location /api/v1/agencias {
        proxy_pass http://api_agencias;
    }

    # ── Swagger dos backends (acesso via gateway) ─────────────────────

    location /usuarios/swagger-ui/ {
        proxy_pass http://api_usuarios/swagger-ui/;
    }
    location /usuarios/v3/api-docs {
        proxy_pass http://api_usuarios/v3/api-docs;
    }

    location /pedidos/swagger-ui/ {
        proxy_pass http://api_pedidos/swagger-ui/;
    }
    location /pedidos/v3/api-docs {
        proxy_pass http://api_pedidos/v3/api-docs;
    }

    location /vistos/swagger-ui/ {
        proxy_pass http://api_vistos/swagger-ui/;
    }
    location /vistos/v3/api-docs {
        proxy_pass http://api_vistos/v3/api-docs;
    }

    location /agencias/swagger-ui/ {
        proxy_pass http://api_agencias/swagger-ui/;
    }
    location /agencias/v3/api-docs {
        proxy_pass http://api_agencias/v3/api-docs;
    }

    # ── Healthcheck do gateway ────────────────────────────────────────
    location /health {
        return 200 'gateway ok\n';
        add_header Content-Type text/plain;
    }
}
